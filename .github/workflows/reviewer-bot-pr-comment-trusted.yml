name: Reviewer Bot PR Comment Trusted

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

env:
  STATE_ISSUE_NUMBER: '314'

jobs:
  reviewer-bot-pr-comment-trusted:
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.user.type == 'User' &&
      contains('OWNER,MEMBER,COLLABORATOR', github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      # Temporary lock debt: contents:write is allowed only for the existing lock-ref API operations.
      contents: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - name: Decide whether same-repo trusted path applies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          pr_number = os.environ['PR_NUMBER']
          repo = os.environ['GITHUB_REPOSITORY']
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/pulls/{pr_number}",
              headers={
                  'Authorization': f"Bearer {os.environ['GITHUB_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
              },
          )
          with urllib.request.urlopen(req) as response:
              pull_request = json.load(response)

          head_repo = pull_request.get('head', {}).get('repo') or {}
          head_full_name = str(head_repo.get('full_name') or '').strip()
          pr_author = str(pull_request.get('user', {}).get('login') or '').strip()
          is_same_repo = head_full_name == repo
          is_dependabot_restricted = pr_author == 'dependabot[bot]'
          run_trusted_path = is_same_repo and not is_dependabot_restricted
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as handle:
              print(f"RUN_TRUSTED_PR_COMMENT={str(run_trusted_path).lower()}", file=handle)
          if run_trusted_path:
              print(f"Trusted same-repo PR comment path enabled for PR #{pr_number}.")
          else:
              reason = 'cross-repo' if not is_same_repo else 'restricted-author'
              print(
                  f"Skipping trusted same-repo PR comment path for PR #{pr_number}: {reason}."
              )
          PY
      - name: Install uv
        if: env.RUN_TRUSTED_PR_COMMENT == 'true'
        run: python -m pip install uv
      - name: Fetch trusted bot source tarball
        if: env.RUN_TRUSTED_PR_COMMENT == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import io, os, tarfile, urllib.request
          from pathlib import Path
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/tarball/{os.environ['GITHUB_SHA']}",
              headers={'Authorization': f"Bearer {os.environ['GITHUB_TOKEN']}", 'Accept': 'application/vnd.github+json'},
          )
          target = Path(os.environ['RUNNER_TEMP']) / 'reviewer-bot-src'
          target.mkdir(parents=True, exist_ok=True)
          with urllib.request.urlopen(req) as response:
              data = response.read()
          with tarfile.open(fileobj=io.BytesIO(data), mode='r:gz') as archive:
              archive.extractall(target)
          roots = list(target.iterdir())
          print(f'BOT_SRC_ROOT={roots[0]}', file=open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8'))
          PY
      - name: Run reviewer bot
        if: env.RUN_TRUSTED_PR_COMMENT == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: issue_comment
          EVENT_ACTION: created
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          IS_PULL_REQUEST: 'true'
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
          COMMENT_USER_TYPE: ${{ github.event.comment.user.type }}
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          COMMENT_SENDER_TYPE: ${{ github.event.sender.type }}
          COMMENT_INSTALLATION_ID: ${{ github.event.installation.id }}
          COMMENT_PERFORMED_VIA_GITHUB_APP: ${{ github.event.comment.performed_via_github_app != null }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_JOB_NAME: ${{ github.job }}
          CURRENT_WORKFLOW_FILE: .github/workflows/reviewer-bot-pr-comment-trusted.yml
          REVIEWER_BOT_TRUST_CLASS: pr_trusted_direct
        run: uv run --project "$BOT_SRC_ROOT" reviewer-bot
      - name: Trusted path skipped
        if: env.RUN_TRUSTED_PR_COMMENT != 'true'
        run: |
          echo 'Trusted same-repo PR comment workflow skipped after PR metadata preflight.'
