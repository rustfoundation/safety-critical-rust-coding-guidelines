name: Reviewer Bot PR Review Comment Observer

on:
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read

jobs:
  observer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Build deferred review comment artifact
        env:
          PAYLOAD_PATH: ${{ runner.temp }}/deferred-review-comment.json
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_AUTHOR: ${{ github.event.pull_request.user.login }}
          ISSUE_STATE: ${{ github.event.pull_request.state }}
          ISSUE_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_AUTHOR_ID: ${{ github.event.comment.user.id }}
          COMMENT_USER_TYPE: ${{ github.event.comment.user.type }}
          COMMENT_SENDER_TYPE: ${{ github.event.sender.type }}
          COMMENT_INSTALLATION_ID: ${{ github.event.installation.id }}
          COMMENT_PERFORMED_VIA_GITHUB_APP: ${{ github.event.comment.performed_via_github_app != null }}
        run: |
          python - <<'PY'
          import json
          import os

          issue_labels = json.loads(os.environ.get('ISSUE_LABELS', '[]') or '[]')
          payload = {
              'payload_kind': 'deferred_review_comment',
              'schema_version': 3,
              'source_workflow_name': 'Reviewer Bot PR Review Comment Observer',
              'source_workflow_file': '.github/workflows/reviewer-bot-pr-review-comment-observer.yml',
              'source_run_id': int(os.environ['GITHUB_RUN_ID']),
              'source_run_attempt': int(os.environ['GITHUB_RUN_ATTEMPT']),
              'source_event_name': 'pull_request_review_comment',
              'source_event_action': 'created',
              'source_event_key': f"pull_request_review_comment:{os.environ['COMMENT_ID']}",
              'pr_number': int(os.environ['PR_NUMBER']),
              'comment_id': int(os.environ['COMMENT_ID']),
              'comment_body': os.environ['COMMENT_BODY'],
              'comment_created_at': os.environ['COMMENT_CREATED_AT'],
              'comment_author': os.environ['COMMENT_AUTHOR'],
              'comment_author_id': int(os.environ['COMMENT_AUTHOR_ID']),
              'comment_user_type': os.environ['COMMENT_USER_TYPE'],
              'comment_sender_type': os.environ['COMMENT_SENDER_TYPE'],
              'comment_installation_id': os.environ.get('COMMENT_INSTALLATION_ID', '').strip() or None,
              'comment_performed_via_github_app': os.environ['COMMENT_PERFORMED_VIA_GITHUB_APP'] == 'true',
              'issue_author': os.environ['ISSUE_AUTHOR'],
              'issue_state': os.environ['ISSUE_STATE'],
              'issue_labels': [str(label) for label in issue_labels if str(label)],
          }
          with open(os.environ['PAYLOAD_PATH'], 'w', encoding='utf-8') as handle:
              json.dump(payload, handle)
          PY
      - name: Upload deferred review comment artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: reviewer-bot-review-comment-context-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/deferred-review-comment.json
          retention-days: 7
