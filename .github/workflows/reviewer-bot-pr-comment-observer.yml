name: Reviewer Bot PR Comment Observer

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  observer:
    if: ${{ github.event.issue.pull_request != null }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Build deferred comment artifact
        env:
          PAYLOAD_PATH: ${{ runner.temp }}/deferred-comment.json
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_AUTHOR_ID: ${{ github.event.comment.user.id }}
          COMMENT_USER_TYPE: ${{ github.event.comment.user.type }}
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          COMMENT_SENDER_TYPE: ${{ github.event.sender.type }}
          COMMENT_INSTALLATION_ID: ${{ github.event.installation.id }}
          COMMENT_PERFORMED_VIA_GITHUB_APP: ${{ github.event.comment.performed_via_github_app != null }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os

          body = os.environ['COMMENT_BODY']
          normalized = "\n".join(line.rstrip() for line in body.replace("\r\n", "\n").split("\n")).strip()
          has_non_command_text = any(
              line.strip() and not line.strip().startswith('@guidelines-bot /')
              for line in normalized.split("\n")
          )
          command_lines = [line for line in normalized.split("\n") if line.strip().startswith('@guidelines-bot /')]
          if len(command_lines) == 0:
              comment_class = 'plain_text'
          elif len(command_lines) == 1 and has_non_command_text:
              comment_class = 'command_plus_text'
          elif len(command_lines) == 1:
              comment_class = 'command_only'
          else:
              comment_class = 'command_plus_text'
          actor_class = 'repo_user_principal'
          user_type = os.environ.get('COMMENT_USER_TYPE', '')
          author = os.environ.get('COMMENT_AUTHOR', '')
          if user_type == 'Bot' or author.endswith('[bot]'):
              actor_class = 'bot_account'
          elif os.environ.get('COMMENT_INSTALLATION_ID', '').strip():
              actor_class = 'github_app_or_other_automation'
          elif not user_type:
              actor_class = 'unknown_actor'
          payload = {
              'schema_version': 2,
              'source_workflow_name': 'Reviewer Bot PR Comment Observer',
              'source_workflow_file': '.github/workflows/reviewer-bot-pr-comment-observer.yml',
              'source_run_id': int(os.environ['GITHUB_RUN_ID']),
              'source_run_attempt': int(os.environ['GITHUB_RUN_ATTEMPT']),
              'source_event_name': 'issue_comment',
              'source_event_action': 'created',
              'source_event_key': f"issue_comment:{os.environ['COMMENT_ID']}",
              'pr_number': int(os.environ['PR_NUMBER']),
              'comment_id': int(os.environ['COMMENT_ID']),
              'comment_class': comment_class,
              'has_non_command_text': has_non_command_text,
              'source_body_digest': hashlib.sha256(normalized.encode('utf-8')).hexdigest(),
              'source_created_at': os.environ['COMMENT_CREATED_AT'],
              'actor_login': author,
              'actor_id': int(os.environ['COMMENT_AUTHOR_ID']),
              'actor_class': actor_class,
              'source_artifact_name': f"reviewer-bot-comment-context-{os.environ['GITHUB_RUN_ID']}-attempt-{os.environ['GITHUB_RUN_ATTEMPT']}",
          }
          with open(os.environ['PAYLOAD_PATH'], 'w', encoding='utf-8') as handle:
              json.dump(payload, handle)
          PY
      - name: Upload deferred comment artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: reviewer-bot-comment-context-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/deferred-comment.json
          retention-days: 7
          if-no-files-found: ignore
