name: Reviewer Bot Sweeper Repair

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        default: check-overdue
        type: choice
        options: [sync-members, show-state, check-overdue, repair-review-status-labels]
      issue_number:
        description: Optional issue or PR number for targeted actions
        required: false
        type: string

permissions:
  contents: read

env:
  STATE_ISSUE_NUMBER: '314'

jobs:
  reviewer-bot-sweeper-repair:
    runs-on: ubuntu-latest
    permissions:
      # Temporary lock debt: contents:write is allowed only for the existing lock-ref API operations.
      contents: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - name: Install uv
        run: python -m pip install uv
      - name: Checkout trusted bot source
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          ref: ${{ github.sha }}
      - name: Select trusted bot source
        id: bot-source
        uses: ./.github/actions/reviewer-bot-source
      - name: Run reviewer bot
        env:
          BOT_SRC_ROOT: ${{ steps.bot-source.outputs.bot-src-root }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          MANUAL_ACTION: ${{ github.event.inputs.action }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_JOB_NAME: ${{ github.job }}
        run: uv run --project "$BOT_SRC_ROOT" reviewer-bot
      - name: Workflow summary
        run: |
          {
            echo 'Deferred-gap operator guidance:'
            echo '- docs/reviewer-bot-review-freshness-operator-runbook.md'
          } >> "$GITHUB_STEP_SUMMARY"
